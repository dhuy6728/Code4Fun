<!DOCTYPE html>
<html>
<head>
    <title>Test Auth Functions</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        input { display: block; margin: 10px 0; padding: 10px; width: 300px; }
        button { padding: 10px 20px; cursor: pointer; background: #6366f1; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>
    <h2>Test Auth Functions</h2>
    
    <h3>Đăng ký</h3>
    <input type="text" id="reg-name" placeholder="Tên hiển thị" value="Test User">
    <input type="email" id="reg-email" placeholder="Email" value="test@example.com">
    <input type="password" id="reg-password" placeholder="Mật khẩu" value="password123">
    <button onclick="testRegister()">Test Đăng Ký</button>
    
    <h3>Đăng nhập</h3>
    <input type="email" id="login-email" placeholder="Email" value="test@example.com">
    <input type="password" id="login-password" placeholder="Mật khẩu" value="password123">
    <button onclick="testLogin()">Test Đăng Nhập</button>
    
    <div id="result" style="margin-top: 20px; padding: 10px; background: #f0f0f0; border-radius: 4px;"></div>

    <script>
        function testRegister() {
            const result = document.getElementById('result');
            result.innerText = 'Bắt đầu test đăng ký...';
            
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;

            if (!name || !email || !password) {
                result.innerText = '❌ Vui lòng điền đủ thông tin!';
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                result.innerText = '❌ Email không hợp lệ!';
                return;
            }
            
            let users = JSON.parse(localStorage.getItem('code4students_users')) || {};
            if (users[email]) {
                result.innerText = '⚠️ Email đã tồn tại!';
                return;
            }

            users[email] = { email, password, name, stats: {} };
            localStorage.setItem('code4students_users', JSON.stringify(users));
            
            result.innerText = '✅ Đăng ký thành công! Kiểm tra localStorage để xác nhận.';
            result.style.color = 'green';
        }
        
        function testLogin() {
            const result = document.getElementById('result');
            result.innerText = 'Bắt đầu test đăng nhập...';
            
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            
            if (!email || !password) {
                result.innerText = '❌ Vui lòng nhập email và mật khẩu!';
                return;
            }
            
            let users = JSON.parse(localStorage.getItem('code4students_users')) || {};
            
            if (users[email] && users[email].password === password) {
                localStorage.setItem('code4students_active_user', email);
                result.innerText = '✅ Đăng nhập thành công! ' + email + ' đã được lưu vào localStorage.';
                result.style.color = 'green';
            } else { 
                result.innerText = '❌ Sai email hoặc mật khẩu!';
                result.style.color = 'red';
            }
        }
    </script>
</body>
</html>
